<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registration | EventHorizon</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


<header class="navbar">

    <div class="nav-inner">

        <a href="index.html" class="brand">

            <img src="images/logo.png"
                 alt="EventHorizon Logo">

            <span>
                Event<span>Horizon</span>
            </span>

        </a>


        <nav class="nav-links">

            <a href="index.html">
                Home
            </a>

            <a href="events.html">
                Events
            </a>

            <a href="about.html">
                About
            </a>

            <a href="contact.html">
                Contact
            </a>

            <a href="registration.html"
               class="btn btn-primary nav-cta">

                Register

            </a>

        </nav>

    </div>

</header>


<section class="hero">

    <div class="container">

        <div class="hero-copy">

            <span class="hero-badge">
                Event Registration
            </span>

            <h1>
                Reserve Your
                <em>Spot.</em>
            </h1>

            <p>
                Complete the registration form below
                to participate in your selected event.
            </p>

        </div>

    </div>

</section>


<section>

    <div class="container">

        <div class="newsletter"
             style="max-width: 800px; margin: auto; display: block;">

            <h3>
                Event Registration Form
            </h3>

            <p>
                Please provide your information below.
            </p>


            <form style="margin-top: 30px;">

                <div style="margin-bottom: 18px;">

                    <label>
                        Full Name
                    </label>

                    <input type="text"
                           placeholder="Enter your full name"
                           required
                           style="width:100%; padding:15px; margin-top:7px; border-radius:10px; border:none;">

                </div>


                <div style="margin-bottom: 18px;">

                    <label>
                        Email Address
                    </label>

                    <input type="email"
                           placeholder="Enter your email"
                           required
                           style="width:100%; padding:15px; margin-top:7px; border-radius:10px; border:none;">

                </div>


                <div style="margin-bottom: 18px;">

                    <label>
                        Student ID
                    </label>

                    <input type="text"
                           placeholder="Enter your student ID"
                           required
                           style="width:100%; padding:15px; margin-top:7px; border-radius:10px; border:none;">

                </div>


                <div style="margin-bottom: 25px;">

                    <label>
                        Select Event
                    </label>

                    <select required
                            style="width:100%; padding:15px; margin-top:7px; border-radius:10px; border:none;">

                        <option value="">
                            Choose an event
                        </option>

                        <option>
                            Tech Innovation Summit
                        </option>

                        <option>
                            UET Cultural Festival
                        </option>

                        <option>
                            Career Development Workshop
                        </option>

                        <option>
                            Programming Challenge
                        </option>

                        <option>
                            Annual Sports Gala
                        </option>

                    </select>

                </div>


                <button type="submit"
                        class="btn btn-gold">

                    Complete Registration

                </button>

            </form>

        </div>

    </div>

</section>


<footer>

    <div class="container">

        <div class="footer-bottom">

            © 2026 EventHorizon — UET Peshawar.

        </div>

    </div>

</footer>


</body>

</html>
